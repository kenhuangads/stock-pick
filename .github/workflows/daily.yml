name: 每日更新

on:
  schedule:
    # 平日多發兜底：GitHub 免費排程在尖峰（13:xx UTC）常延遲數小時甚至靜默不觸發，
    # 故整晚灑 5 發、刻意跨到較不擁擠的較晚 UTC 時段，提高「至少一發準時」機率。
    # 抓取採「往回探最近交易日」，延遲跨午夜也能抓對；程式冪等，先成功者更新後，
    # 後續各發走「快照已完整」快速路徑 ~30s 跳過，不重複做白工。（台北 = UTC+8）
    - cron: '10 13 * * 1-5'   # 21:10 台北
    - cron: '40 13 * * 1-5'   # 21:40 台北
    - cron: '20 14 * * 1-5'   # 22:20 台北
    - cron: '10 15 * * 1-5'   # 23:10 台北
    - cron: '10 16 * * 1-5'   # 00:10 台北（隔日；往回探仍抓當日交易資料）
  workflow_dispatch:
    inputs:
      force:
        description: '即使沒有新資料也強制重建輸出'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: daily-update
  cancel-in-progress: false

# Pages 採 branch 部署（main 根目錄）：資料 commit push 後 GitHub 自動建置，
# 無需部署 job。（actions/deploy-pages 管線曾整晚故障，branch 模式 30 秒完成。）
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: 抓行情 → 復盤 → 迭代優化 → 智能選股
        run: python scripts/daily_update.py ${{ inputs.force && '--force' || '' }}
      - name: 復盤紀錄審計（逐筆重放核實，未通過不得 commit）
        run: python scripts/verify_reviews.py
      - name: Commit 資料更新（push 後 Pages 自動建置）
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A data/
          if git diff --cached --quiet; then
            echo "沒有資料變更（休市或已更新）"
          else
            git commit -m "chore(data): daily update $(TZ=Asia/Taipei date +'%Y-%m-%d')"
            git push
          fi
