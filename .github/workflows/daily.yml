name: 每日更新

on:
  schedule:
    # 13:07 UTC = 21:07 台北時間，平日執行（避開整點尖峰——GitHub 整點 cron 常被延遲或丟棄）。
    # 此時收盤行情、個股當沖統計、處置/注意公告皆已發布；休市日會自動跳過。
    - cron: '7 13 * * 1-5'
  workflow_dispatch:
    inputs:
      force:
        description: '即使沒有新資料也強制重建輸出'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: daily-update
  cancel-in-progress: false

# Pages 採 branch 部署（main 根目錄）：資料 commit push 後 GitHub 自動建置，
# 無需部署 job。（actions/deploy-pages 管線曾整晚故障，branch 模式 30 秒完成。）
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: 抓行情 → 復盤 → 迭代優化 → 智能選股
        run: python scripts/daily_update.py ${{ inputs.force && '--force' || '' }}
      - name: 復盤紀錄審計（逐筆重放核實，未通過不得 commit）
        run: python scripts/verify_reviews.py
      - name: Commit 資料更新（push 後 Pages 自動建置）
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A data/
          if git diff --cached --quiet; then
            echo "沒有資料變更（休市或已更新）"
          else
            git commit -m "chore(data): daily update $(TZ=Asia/Taipei date +'%Y-%m-%d')"
            git push
          fi
